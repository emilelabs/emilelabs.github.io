<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emile Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FFF8F0; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .container { max-width: 600px; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .tagline { color: #666; font-size: 1.1rem; margin-bottom: 2rem; }
        .app-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 2rem; }
        .app-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .app-name { font-size: 1.5rem; font-weight: 600; }
        .app-desc { color: #666; margin-top: 0.5rem; }
        .links { margin-top: 2rem; }
        .links a { color: #6C5CE7; text-decoration: none; margin: 0 1rem; font-size: 0.95rem; }
        .links a:hover { text-decoration: underline; }
        footer { margin-top: 3rem; color: #999; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Emile Labs</h1>
        <p class="tagline">Learning apps for curious kids</p>
        <div class="app-card">
            <div class="app-icon">🔴</div>
            <div class="app-name">DotsCard</div>
            <p class="app-desc">Build number sense through dot-pattern recognition. For children aged 5-9.</p>
        </div>
        <div class="links">
            <a href="/privacy">Privacy Policy</a>
            <a href="/terms">Terms of Use</a>
            <a href="mailto:support@emilelabs.com">Support</a>
        </div>
        <footer>&copy; 2026 Emile Labs. Melbourne, Australia.</footer>
    </div>
</body>
</html>
